# Thin release-trigger for the Windows sponsor-gated distribution.
#
# On tag push (v*), fires a repository_dispatch event at deblasis/winghostty-release
# so the private release repo can build, sign, pack, and upload without needing any
# Azure or R2 credentials to live in this public repo. See docs spec section 4.4.
#
# DORMANT UNTIL ENABLED: the job is a no-op while vars.ENABLE_RELEASE_DISPATCH
# is unset or not 'true'. This prevents noisy failures before the private repo
# + RELEASE_DISPATCH_TOKEN secret are provisioned.

name: trigger-release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: vars.ENABLE_RELEASE_DISPATCH == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Derive channel from ref
        id: chan
        shell: bash
        run: |
          case "${{ github.ref }}" in
            refs/tags/v*) echo "channel=stable" >> "$GITHUB_OUTPUT" ;;
            *)            echo "channel=tip"    >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Dispatch release event to deblasis/winghostty-release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
        run: |
          gh api /repos/deblasis/winghostty-release/dispatches \
            -f event_type=release \
            -f "client_payload[channel]=${{ steps.chan.outputs.channel }}" \
            -f "client_payload[ref]=${{ github.ref }}"
